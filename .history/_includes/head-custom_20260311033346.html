<!-- Canonical URL -->
<link rel="canonical" href="{{ page.url | absolute_url }}" />

<!-- Open Graph / Social -->
<meta property="og:title" content="{{ page.title | default: site.title }}" />
<meta property="og:description" content="{{ page.description | default: site.description }}" />
<meta property="og:url" content="{{ page.url | absolute_url }}" />
<meta property="og:site_name" content="Jordan Schilling" />
<meta property="og:type" content="website" />

<!-- JSON-LD Structured Data for Person -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Jordan Schilling",
  "url": "https://jordanschilling.me",
  "sameAs": [
    "https://github.com/jschilling12"
  ],
  "jobTitle": "Software Engineer",
  "description": "Jordan Schilling is a technologist and software engineer focused on building automation systems, experimental tools, and civic technology projects.",
  "knowsAbout": ["Software Engineering", "Test Automation", "DevOps", "CI/CD", "Python", "TypeScript", "Playwright", "Civic Technology"]
}
</script>

<!-- JSON-LD for Website -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Jordan Schilling",
  "url": "https://jordanschilling.me",
  "description": "Jordan Schilling is a technologist and software engineer focused on building automation systems, experimental tools, and civic technology projects.",
  "author": {
    "@type": "Person",
    "name": "Jordan Schilling"
  }
}
</script>
