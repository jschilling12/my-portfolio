<!-- start custom head snippets, customize with your own _includes/head-custom.html file -->

<!-- Setup Google Analytics -->
{% include head-custom-google-analytics.html %}

<!-- Favicon -->
<link rel="shortcut icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}" />

<!-- og:image for social sharing -->
<meta property="og:image" content="{{ '/assets/img/logo.png' | absolute_url }}" />

<!-- JSON-LD Structured Data for Person -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Jordan Schilling",
  "url": "https://jordanschilling.me",
  "image": "{{ '/assets/img/logo.png' | absolute_url }}",
  "sameAs": [
    "https://github.com/jschilling12"
  ],
  "jobTitle": "Software Engineer",
  "description": "Technologist and software engineer focused on building automation systems, experimental tools, and developer productivity.",
  "knowsAbout": ["Software Engineering", "Test Automation", "DevOps", "CI/CD", "Python", "TypeScript", "Playwright"]
}
</script>

<!-- JSON-LD for Website -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Jordan Schilling",
  "url": "https://jordanschilling.me",
  "description": "Technologist and software engineer focused on building automation systems, experimental tools, and civic technology projects.",
  "author": {
    "@type": "Person",
    "name": "Jordan Schilling"
  }
}
</script>

<!-- end custom head snippets -->
